name: secret-scan
on: [push, pull_request]

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history so the scan covers every commit
      - name: repo secret/PII guard (full history)
        # The repo's own scanner — no third-party action, no org license required.
        # (gitleaks-action requires a paid GITLEAKS_LICENSE for org repos.)
        run: python3 .githooks/secret-scan.py diff HEAD
